<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPOLOC AR Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #faf9f7; color: #1a1714; }
    .container { max-width: 600px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 24px; font-weight: 500; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; margin-bottom: 24px; }
    model-viewer {
      width: 100%;
      height: 400px;
      border-radius: 12px;
      background: #f0ece6;
      margin-bottom: 24px;
      --poster-color: #f0ece6;
    }
    .ar-button {
      display: block;
      width: 100%;
      padding: 16px;
      background: #1a1714;
      color: #f5f0e8;
      border: none;
      border-radius: 50px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
    }
    .hint {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 12px;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>APPOLOC AR Preview</h1>
    <p>Sieh dein Board direkt auf deiner Wand. Tippe auf den AR-Button um die Kamera zu öffnen.</p>
    
    <model-viewer
      src="appoloc-board-3.glb"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-scale="fixed"
      camera-controls
      touch-action="pan-y"
      auto-rotate
      shadow-intensity="1"
      shadow-softness="0.5"
      exposure="1.2"
      alt="APPOLOC 3 Board mit Spiegel, Moos und Leder"
    >
      <button slot="ar-button" class="ar-button">
        📱 In AR auf deiner Wand ansehen
      </button>
    </model-viewer>
    
    <p class="hint">Drehe und zoome das Modell mit den Fingern. AR funktioniert auf iOS (Safari) und Android (Chrome).</p>
  </div>
</body>
</html>
